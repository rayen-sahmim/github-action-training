name: Test Project
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "02 Starting Project"
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: install node
        uses: actions/setup-node@v6
      - name: install dependencies
        run: npm install
      - name: run tests
        run: npm test
      
          
          